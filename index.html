  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#83AECB;border-radius:5px;padding:2px 5px;display:inline-block\">現在<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ ev.notNow }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"font-size:10px;color:#B8B0A4\">{{ ev.startTime }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"{{ ev.barStyle }}\"><\u002Fdiv>\n                <div><div style=\"font-size:12px;font-weight:500;color:#1A1614\">{{ ev.title }}<\u002Fdiv><div style=\"font-size:10px;color:#B8B0A4;margin-top:2px\">{{ ev.timeRange }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 理想的一天 -->\n        <div style=\"padding:14px 16px 0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:9px\">\n            <div style=\"font-size:11px;font-weight:500;color:#8C7E72;letter-spacing:.4px\">理想的一天<\u002Fdiv>\n            <div onclick=\"{{ toggleEditIdealDay }}\" style=\"font-size:10px;color:#83AECB;cursor:pointer;font-weight:500\">{{ idealDayBtnLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ editingIdealDay }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 1px 8px rgba(0,0,0,.05)\">\n              <textarea value=\"{{ idealDay }}\" onchange=\"{{ setIdealDay }}\" rows=\"5\" placeholder=\"今天我想要⋯\" style=\"width:100%;padding:0;border:none;font-family:'Noto Sans TC',system-ui;font-size:13px;color:#1A1614;background:transparent;resize:none;outline:none;line-height:1.75;display:block\"><\u002Ftextarea>\n              <div style=\"display:flex;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid #F0E8DC\">\n                <div onclick=\"{{ saveIdealDay }}\" style=\"padding:7px 18px;background:#1A1614;border-radius:8px;cursor:pointer\">\n " y2=\"18\"><\u002Fline>\n                  <line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline>\n                <\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;gap:8px;align-items:center\">\n            <input value=\"{{ newTodoText }}\" onchange=\"{{ setNewTodoText }}\" onkeydown=\"{{ handleTodoKeyDown }}\" placeholder=\"新增臨時待辦⋯\" style=\"flex:1;padding:11px 14px;border:1.5px solid #E0D8CC;border-radius:12px;font-family:'Noto Sans TC',system-ui;font-size:13px;color:#1A1614;background:#fff;outline:none;-webkit-appearance:none\">\n            <div onclick=\"{{ addQuickTodo }}\" style=\"width:40px;height:40px;border-radius:50%;background:#1A1614;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FAF7F2\" stroke-width=\"2.2\" stroke-linecap=\"round\">\n                <line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline>\n                <line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline>\n              <\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── CHECK-IN ── -->\n    <sc-if value=\"{{ showCheckin }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background:#fff;padding:20px 20px 16px;border-bottom:1px solid #EDE5D8\">\n          <div style=\"font-size:11px;color:#8C7E72\">{{ greetingDate }}<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600;color:#1A1614;margin-top:3px;letter-spacing:-.3px\">今日習慣打卡<\u002Fdiv>\n          <div style=\"margin-top:13px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n              <div style=\"font-size:11px;color:#8C7E72\">今日完成<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#1A1614\">{{ doneCount ottom:18px;padding:14px;background:#F8F3E8;border-radius:12px;border:1px solid #EDE0B8\">\n              <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:8px\">\n                <div style=\"font-size:11px;color:#1A1614;font-weight:500\">🎯 下週目標<\u002Fdiv>\n                <div style=\"font-size:9px;color:#A89060;background:#FBF0D8;border-radius:6px;padding:2px 8px;font-weight:500\">儲存後顯示於下週首頁<\u002Fdiv>\n              <\u002Fdiv>\n              <textarea value=\"{{ weeklyReview.nextGoal }}\" onchange=\"{{ updateNextGoal }}\" placeholder=\"設定下週想達成的目標⋯\" rows=\"3\" style=\"width:100%;padding:10px 12px;border:1.5px solid #E8D8A8;border-radius:10px;font-family:'Noto Sans TC',system-ui;font-size:12px;color:#1A1614;background:#FDFAF5;resize:none;outline:none;line-height:1.6\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div onclick=\"{{ saveWeeklyReview }}\" style=\"padding:14px;background:#1A1614;border-radius:12px;text-align:center;cursor:pointer\">\n              <span style=\"font-size:13px;color:#FAF7F2;font-weight:500\">儲存本週回顧<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:28px\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── LEARNING ── -->\n    <sc-if value=\"{{ showLearn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background:#fff;padding:20px 20px 16px;border-bottom:1px solid #EDE5D8;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font-size:20px;font-weight:600;color:#1A1614;letter-spacing:-.3px\">學習規劃<\u002Fdiv>\n            <div style=\"font-size:11px;color:#8C7E72;margin-top:3px\">追蹤進度 · 筆記 · 重點摘錄<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ openAddLearning }}\" style=\"width:38px;height:38px;border-radius:50%;background:#EEF4F0;display:flex;align-items:center;justify-content:center;cursor:pointer\">\n            <svg width=\"18\" height=\"18 ize:12px;color:#8C7E72\">取消<\/span><\/div>\n              <div onclick=\"{{ confirmAddLearning }}\" style=\"flex:2;padding:10px;background:#1A1614;border-radius:10px;text-align:center;cursor:pointer\"><span style=\"font-size:12px;color:#FAF7F2;font-weight:500\">新增<\/span><\/div>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n        <sc-for list=\"{{ activeLearningItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05)\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:13px\">\n                <div style=\"width:40px;height:40px;border-radius:12px;background:#EEF4F8;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0\">{{ item.emoji }}<\u002Fdiv>\n                <div style=\"flex:1\">\n                  <div style=\"font-size:13px;font-weight:500;color:#1A1614;line-height:1.3\">{{ item.title }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#8C7E72;margin-top:3px\">{{ item.notes }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\">\n                <div style=\"flex:1;height:4px;background:#EDE5D8;border-radius:2px;overflow:hidden\">\n                  <div style=\"height:4px;background:#83AECB;border-radius:2px;width:{{ item.progressWidth }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:11px;color:#83AECB;font-weight:500\">{{ item.progress }}%<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <div onclick=\"{{ item.hasNoteLink ? item.openNote : item.toggleNote }}\" style=\"flex:1;padding:9px;border:1px solid #E8E0D4;border-radius:10px;text-align:center;cursor:pointer\">\n                  <span style=\"font-size:10px;color:#8C7E72\">📄 筆記<\u002Fspan>\n                <\u002Fdiv>\n                <div onclick=\"{{ item.complete }}\" style=\"flex:1;padding:9px;background:#EEF4F0;border:1px solid #C8DCCA;border-radius:10px;text-align:center;cursor:pointer\">\n                  <span style=\"font-size:10px;color:#4A6A4C;font-weight:600\">完成！<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Notes panel -->\n              <sc-if value=\"{{ item.showNote }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:10px;padding:13px 14px;background:#F5F0E8;border-radius:10px;animation:fadeIn .2s ease\">\n                  <div style=\"font-size:9px;color:#8C7E72;letter-spacing:.5px;margin-bottom:5px;font-weight:500\">APPLE 備忘錄連結<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#1A1614;font-weight:500;margin-bottom:2px\">{{ item.title }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#8C7E72;margin-bottom:10px;line-height:1.55\">在備忘錄建立同名筆記，再用「快捷指令」設定捷徑直接跳轉<\u002Fdiv>\n                  <a href=\"https://www.icloud.com/shortcuts/1b3c3877359a4789a601c69a4290ee89\" style=\"display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;background:#1A1614;border-radius:9px;text-decoration:none\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FAF7F2\" stroke-width=\"1.8\" stroke-linecap=\"round\">\n                      <path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath>\n                      <polyline points=\"14,2 14,8 20,8\"><\u002Fpolyline>\n                      <line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"><\u002Fline>\n                      <line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"><\u002Fline>\n                    <\u002Fsvg>\n                    <span style=\"font-size:11px;color:#FAF7F2;font-weight:500\">開啟 Apple 備忘錄 ↗<\u002Fspan>\n                  <\u002Fa>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- Completed section -->\n          <sc-if value=\"{{ hasCompletedLearning }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:4px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-left:2px\">\n                <div style=\"flex:1;height:1px;background:#E8E0D4\"><\u002Fdiv>\n                <div style=\"font-size:10px;font-weight:500;color:#B8B0A4;letter-spacing:.5px\">已完成<\u002Fdiv>\n                <div style=\"flex:1;height:1px;background:#E8E0D4\"><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ completedLearningItems }}\" as=\"item\" hint-placeholder-count=\"1\">\n                <div style=\"background:#F5F0E8;border-radius:14px;padding:13px 16px;margin-bottom:8px\">\n                  <div style=\"display:flex;align-items:center;gap:10px\">\n                    <div style=\"font-size:20px;flex-shrink:0;opacity:.6\">{{ item.emoji }}<\u002Fdiv>\n                    <div style=\"flex:1\">\n                      <div style=\"font-size:12px;color:#A8A098;text-decoration:line-through;line-height:1.3\">{{ item.title }}<\u002Fdiv>\n                      <div style=\"font-size:10px;color:#C4B8A8;margin-top:2px\">完成於 {{ item.completedLabel }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"width:20px;height:20px;border-radius:50%;background:#8EAA88;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n                      <svg width=\"10\" height=\"10\" viewBox=\"0 0 12 12\" fill=\"none\">\n                        <polyline points=\"2,6 4.5,9 10,3\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n                      <\u002Fsvg>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── DRINKS ── -->\n    <sc-if value=\"{{ showDrinks }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background:#fff;padding:20px 20px 16px;border-bottom:1px solid #EDE5D8\">\n          <div style=\"font-size:20px;font-weight:600;color:#1A1614;letter-spacing:-.3px\">飲料紀錄<\u002Fdiv>\n          \n        <\u002Fdiv>\n        <div style=\"padding:16px 16px 0\">\n          <!-- Month header -->\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:9px\">\n            <div style=\"font-size:11px;font-weight:500;color:#8C7E72;letter-spacing:.4px\">{{ drinkMonthLabel }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px\">\n              <div style=\"width:8px;height:8px;border-radius:50%;background:#83AECB\"><\u002Fdiv>\n              <span style=\"font-size:10px;color:#8C7E72\">本月 {{ drinkDayCount }} 天<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Calendar card -->\n          <div style=\"background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,.05)\">\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px\">\n              <sc-for list=\"{{ calendarHeaders }}\" as=\"ch\" hint-placeholder-count=\"7\">\n                <div style=\"text-align:center;font-size:9px;color:#8C7E72;font-weight:500;padding:2px 0\">{{ ch.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px\">\n              <sc-for list=\"{{ calendarCells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n                <sc-if value=\"{{ cell.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"aspect-ratio:1\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ cell.hasDay }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div onclick=\"{{ cell.select }}\" style=\"{{ cell.cellStyle }}\">\n                    <span style=\"{{ cell.numStyle }}\">{{ cell.day }}<\u002Fspan>\n                    <sc-if value=\"{{ cell.hasDrink }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"width:5px;height:5px;border-radius:50%;background:#83AECB;margin-top:1px\"><\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ cell.nodrink }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"width:5px;height:5px;margin-top:1px\"><\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Date selector & entries -->\n        <div style=\"padding:14px 16px 0\">\n          <div style=\"background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05)\">\n            <!-- Date navigation -->\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid #F0E8DC\">\n              <div onclick=\"{{ prevDrinkDay }}\" style=\"width:34px;height:34px;border-radius:50%;background:#F5EFE8;display:flex;align-items:center;justify-content:center;cursor:pointer\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8C7E72\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"15,18 9,12 15,6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"text-align:center\">\n                <div style=\"font-size:14px;font-weight:600;color:#1A1614\">{{ selectedDateLabel }}<\u002Fdiv>\n                <div style=\"font-size:10px;color:#8C7E72;margin-top:2px\">{{ selectedDrinkCountLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ nextDrinkDay }}\" style=\"width:34px;height:34px;border-radius:50%;background:#F5EFE8;display:flex;align-items:center;justify-content:center;cursor:pointer\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8C7E72\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9,18 15,12 9,6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Drink entries -->\n            <sc-for list=\"{{ selectedDrinkEntries }}\" as=\"entry\" hint-placeholder-count=\"1\">\n              <div style=\"background:#F8F4EE;border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px\">\n                <div style=\"flex:1\">\n                  <div style=\"font-size:13px;font-weight:500;color:#1A1614;margin-bottom:4px\">{{ entry.name }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:center\">\n                    <div style=\"font-size:10px;color:#8C7E72\">{{ entry.store }}<\u002Fdiv>\n                    <div style=\"width:3px;height:3px;border-radius:50%;background:#C4BAB0\"><\u002Fdiv>\n                    <div style=\"font-size:10px;color:#83AECB;font-weight:500\">NT$ {{ entry.cost }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ entry.remove }}\" style=\"width:26px;height:26px;border-radius:50%;background:#EDE5D8;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0\">\n                  <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8C7E72\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <!-- Add form -->\n            <sc-if value=\"{{ showAddDrink }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#F5F0E8;border-radius:12px;padding:14px;margin-bottom:10px;animation:fadeIn .18s ease\">\n                <div style=\"margin-bottom:10px\">\n                  <div style=\"font-size:10px;color:#8C7E72;margin-bottom:5px;font-weight:500\">飲料名稱<\u002Fdiv>\n                  <input value=\"{{ newDrinkName }}\" onchange=\"{{ setNewDrinkName }}\" placeholder=\"珍珠奶茶\" style=\"width:100%;padding:9px 12px;border:1.5px solid #E0D8CC;border-radius:9px;font-family:'Noto Sans TC',system-ui;font-size:13px;color:#1A1614;background:#FDFAF5;outline:none;-webkit-appearance:none\">\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-bottom:12px\">\n                  <div style=\"flex:1\">\n                    <div style=\"font-size:10px;color:#8C7E72;margin-bottom:5px;font-weight:500\">店家<\u002Fdiv>\n                    <input value=\"{{ newDrinkStore }}\" onchange=\"{{ setNewDrinkStore }}\" placeholder=\"50嵐\" style=\"width:100%;padding:9px 12px;border:1.5px solid #E0D8CC;border-radius:9px;font-family:'Noto Sans TC',system-ui;font-size:13px;color:#1A1614;background:#FDFAF5;outline:none;-webkit-appearance:none\">\n                  <\u002Fdiv>\n                  <div style=\"flex:1\">\n                    <div style=\"font-size:10px;color:#8C7E72;margin-bottom:5px;font-weight:500\">費用（NT$）<\u002Fdiv>\n                    <input value=\"{{ newDrinkCost }}\" onchange=\"{{ setNewDrinkCost }}\" placeholder=\"65\" type=\"number\" style=\"width:100%;padding:9px 12px;border:1.5px solid #E0D8CC;border-radius:9px;font-family:'Noto Sans TC',system-ui;font-size:13px;color:#1A1614;background:#FDFAF5;outline:none;-webkit-appearance:none\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px\">\n                  <div onclick=\"{{ cancelAddDrink }}\" style=\"flex:1;padding:9px;border:1.5px solid #E0D8CC;border-radius:10px;text-align:center;cursor:pointer\">\n                    <span style=\"font-size:12px;color:#8C7E72\">取消<\u002Fspan>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ saveNewDrink }}\" style=\"flex:2;padding:9px;background:#1A1614;border-radius:10px;text-align:center;cursor:pointer\">\n                    <span style=\"font-size:12px;color:#FAF7F2;font-weight:500\">儲存<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ notShowAddDrink }}\" hint-placeholder-val=\"{{ true }}\">\n              <div onclick=\"{{ openAddDrink }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:1.5px dashed #D8D0C4;border-radius:12px;cursor:pointer\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B8B0A4\" stroke-width=\"2.2\" stroke-linecap=\"round\">\n                  <line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline>\n                  <line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline>\n                <\u002Fsvg>\n                <span style=\"font-size:12px;color:#B8B0A4\">新增飲料<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── STARS ── -->\n    <sc-if value=\"{{ showStars }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background:#D46B5A;padding:26px 20px 22px;position:relative;overflow:hidden\">\n          <svg style=\"position:absolute;right:12px;top:10px;opacity:.18;pointer-events:none\" width=\"100\" height=\"100\" viewBox=\"0 0 100 100\">\n            <circle cx=\"20\" cy=\"20\" r=\"2.5\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"72\" cy=\"14\" r=\"4\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"46\" cy=\"56\" r=\"2\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"82\" cy=\"64\" r=\"3.5\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"14\" cy=\"72\" r=\"2\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"58\" cy=\"33\" r=\"1.5\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"88\" cy=\"38\" r=\"2.5\" fill=\"#FFF7F2\"><\u002Fcircle>\n            <circle cx=\"36\" cy=\"84\" r=\"2\" fill=\"#FFF7F2\"><\u002Fcircle>\n          <\u002Fsvg>\n          <svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFF7F2\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:6px\">\n            <polygon points=\"12,2 15.1,8.3 22,9.3 17,14.1 18.2,21 12,17.8 5.8,21 7,14.1 2,9.3 8.9,8.3\"><\u002Fpolygon>\n          <\u002Fsvg>\n          <div style=\"font-size:22px;font-weight:600;color:#FFF7F2;letter-spacing:-.3px\">星星時刻<\u002Fdiv>\n          <div style=\"font-size:12px;color:rgba(255,247,242,.7);margin-top:5px\">記錄每一個讓你感到驕傲的瞬間<\u002Fdiv>\n          <div style=\"margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,247,242,.15);border-radius:20px;padding:6px 14px\">\n            <span style=\"font-size:12px;color:#FFF7F2;font-weight:500\">已記錄 {{ starCount }} 個時刻<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:16px 16px 0\">\n          <div onclick=\"{{ openAddStar }}\" style=\"background:#D4A83A;border-radius:16px;padding:15px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:0 4px 12px rgba(212,168,58,.28)\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline>\n              <line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline>\n            <\u002Fsvg>\n            <span style=\"font-size:14px;font-weight:500;color:#fff\">記錄這一刻<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px 28px\">\n          <div style=\"font-size:11px;font-weight:500;color:#8C7E72;letter-spacing:.4px;margin-bottom:10px\">回顧紀錄<\u002Fdiv>\n          <sc-for list=\"{{ stars }}\" as=\"star\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 8px rgba(0,0,0,.05)\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\">\n                <div style=\"display:flex;align-items:center;gap:7px\">\n                  <span style=\"font-size:16px\">{{ star.icon }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:500;color:#1A1614\">{{ star.type }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:10px;color:#B8B0A4\">{{ star.date }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;color:#1A1614;line-height:1.65\">{{ star.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- ══ BOTTOM NAV ══ -->\n  <div style=\"position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid #EDE5D8;display:flex;padding:8px 0 18px;box-shadow:0 -2px 14px rgba(0,0,0,.06);max-width:430px;margin:0 auto\">\n    <div onclick=\"{{ goHome }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabHomeColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M3 10L12 3l9 7v10a1 1 0 01-1 1H5a1 1 0 01-1-1z\"><\u002Fpath>\n        <path d=\"M9 21V13h6v8\"><\u002Fpath>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabHomeColor }}\">首頁<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ goCheckin }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabCheckinColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n        <polyline points=\"8.5,12.5 11,15 15.5,9.5\"><\u002Fpolyline>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabCheckinColor }}\">打卡<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ goWeekly }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabWeeklyColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n        <rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2.5\"><\u002Frect>\n        <line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline>\n        <line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline>\n        <line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabWeeklyColor }}\">週計畫<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ goLearn }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabLearnColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n        <path d=\"M4 19.5A2.5 2.5 0 016.5 17H20\"><\u002Fpath>\n        <path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z\"><\u002Fpath>\n        <line x1=\"9\" y1=\"7\" x2=\"15\" y2=\"7\"><\u002Fline>\n        <line x1=\"9\" y1=\"11\" x2=\"12\" y2=\"11\"><\u002Fline>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabLearnColor }}\">學習<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ goDrinks }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabDrinksColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M7 10h10l-1.8 9.5a1 1 0 01-1 .5H9.8a1 1 0 01-1-.5L7 10z\"><\u002Fpath>\n        <rect x=\"6\" y=\"7\" width=\"12\" height=\"3\" rx=\"1.5\"><\u002Frect>\n        <line x1=\"14.5\" y1=\"7\" x2=\"16.5\" y2=\"2.5\"><\u002Fline>\n        <circle cx=\"16.5\" cy=\"2.5\" r=\"1\" fill=\"{{ tabDrinksColor }}\" stroke=\"none\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabDrinksColor }}\">飲料<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ goStars }}\" style=\"flex:1;text-align:center;cursor:pointer;padding:2px 0\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ tabStarsColor }}\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <polygon points=\"12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26\"><\u002Fpolygon>\n      <\u002Fsvg>\n      <div style=\"font-size:9px;margin-top:3px;font-weight:500;color:{{ tabStarsColor }}\">星星<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = {\n    activeTab: 'home',\n    habits: {\n      A1:false, A2:false, A3:false, A4:false,\n      B1:false, B2:false, B3:false, B4:false, B5:false, B6:false,\n      C1:false,\n    },\n    stars: [\n      { id:1, date:'6月25日', text:'今天晨跑完成5公里，突破了自己的極限！', type:'成就', icon:'🏆' },\n      { id:2, date:'6月23日', text:'幫助同事解決困擾很久的問題，對方真誠地道謝，很有成就感', type:'自信', icon:'💪' },\n      { id:3, date:'6月20日', text:'第一次嘗試做日式料理，成品超美味！', type:'勇氣', icon:'🦁' },\n    ],\n    newStarText: '',\n    newStarType: '成就',\n    showAddStar: false,\n    weeklyReview: { effective:'', learnings:'', improve:'', change:'', nextGoal:'' },\n    weeklyGoal: '完成本週三件最重要的事，並保持每天早起的好習慣。',\n    editingWeeklyGoal: false,\n    idealDay: '今天是充實的一天。\\n我將專注完成三件最重要的事，並在日落前好好享受屬於自己的時光。',\n    editingIdealDay: false,\n    drinkEntries: {},  // { 'YYYY-MM-DD': [{id, name, store, cost}] }\n    selectedDrinkDate: (() => {\n      const n = new Date();\n      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;\n    })(),\n    newDrink: { name:'', store:'', cost:'' },\n    showAddDrink: false,\n    learningItems: [\n      { id:1, title:'JavaScript 進階課程', progress:65, notes:'Promise / async await 已完成', emoji:'💻', completed:false, completedAt:null },\n      { id:2, title:'設計思考工作坊', progress:30, notes:'第 2 週模組進行中', emoji:'✏️', completed:false, completedAt:null },\n      { id:3, title:'日語 N3 備考', progress:80, notes:'文法部分還需加強', emoji:'🇯🇵', completed:false, completedAt:null },\n    ],\n    showLearningNote: null,\n    showAddLearning: false,\n    newLearningTitle: '',\n    newLearningEmoji: '📚',\n    newLearningNoteLink: '',\n    quickTodos: [],\n    newTodoText: '',\n  };\n\n  toggleHabit(id) {\n    const newVal = !this.state.habits[id];\n    this.setState(s => ({ habits: { ...s.habits, [id]: !s.habits[id] } }));\n    const now = new Date();\n    const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec', { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({ type:'習慣打卡', date, habitId:id, checked:newVal }) }).catch(()=>{});\n  }\n\n  saveStar() {\n    const { newStarText, newStarType, stars } = this.state;\n    if (!newStarText.trim()) return;\n    const now = new Date();\n    const date = `${now.getMonth()+1}月${now.getDate()}日`;\n    const icons = { '成就':'🏆', '自信':'💪', '感恩':'🙏', '勇氣':'🦁' };\n    const star = { id:Date.now(), date, text:newStarText.trim(), type:newStarType, icon:icons[newStarType]||'⭐' };\n    this.setState({ stars:[star,...stars], newStarText:'', showAddStar:false });\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec', { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({ type:'星星時刻', date:star.date, text:star.text, starType:star.type }) }).catch(()=>{});\n  }\n\n  fetchCalendar() {\n    this.setState({ calendarLoading:true });\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec?action=calendar')\n      .then(r => r.json())\n      .then(data => {\n        if (data.ok) this.setState({ calendarEvents: data.events, calendarLoading:false });\n        else this.setState({ calendarLoading:false });\n      })\n      .catch(() => this.setState({ calendarLoading:false }));\n  }\n\n  fetchHistory() {\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec?action=history')\n      .then(r => r.json())\n      .then(data => {\n        if (!data.ok) return;\n        const update = {};\n        if (data.stars && data.stars.length > 0) {\n          update.stars = data.stars.map(s => {\n            if (s.date && s.date.length > 10) {\n              const d = new Date(s.date);\n              if (!isNaN(d)) s = { ...s, date: (d.getMonth()+1) + '\\u6708' + d.getDate() + '\\u65e5' };\n            }\n            return s;\n          });\n          localStorage.setItem('db_stars', JSON.stringify(update.stars));\n        }\n        if (data.drinkEntries && Object.keys(data.drinkEntries).length > 0) {\n          update.drinkEntries = data.drinkEntries;\n          localStorage.setItem('db_drinks', JSON.stringify(data.drinkEntries));\n        }\n        if (Object.keys(update).length > 0) this.setState(update);\n      })\n      .catch(() => {});\n  }\n\n  completeLearning(id) {\n    const item = this.state.learningItems.find(i => i.id === id);\n    const newLearning = this.state.learningItems.map(it =>\n      it.id === id ? { ...it, completed:true, completedAt:Date.now() } : it\n    );\n    this.setState(s => ({\n      learningItems: s.learningItems.map(item =>\n        item.id === id ? { ...item, completed:true, completedAt:Date.now() } : item\n      ),\n      showLearningNote: null,\n    showAddLearning: false,\n    newLearningTitle: '',\n    newLearningEmoji: '📚',\n    }));\n    localStorage.setItem('db_learning', JSON.stringify(newLearning));\n    if (item) fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec', { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({ type:'學習規劃', title:item.title, category:item.category, completedAt:new Date().toISOString() }) }).catch(()=>{});\n  }\n\n  updateReview(field, val) {\n    this.setState(s => ({ weeklyReview:{ ...s.weeklyReview, [field]:val } }));\n  }\n\n  addQuickTodo() {\n    const { newTodoText, quickTodos } = this.state;\n    if (!newTodoText.trim()) return;\n    this.setState({\n      quickTodos: [...quickTodos, { id: Date.now(), text: newTodoText.trim() }],\n      newTodoText: '',\n    });\n  }\n\n  deleteQuickTodo(id) {\n    this.setState(s => ({ quickTodos: s.quickTodos.filter(t => t.id !== id) }));\n  }\n\n  shiftDrinkDay(delta) {\n    const { selectedDrinkDate } = this.state;\n    const d = new Date(selectedDrinkDate + 'T00:00:00');\n    d.setDate(d.getDate() + delta);\n    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n    this.setState({ selectedDrinkDate: key, showAddDrink: false, newDrink: { name:'', store:'', cost:'' } });\n  }\n\n  saveNewDrink() {\n    const { selectedDrinkDate, newDrink, drinkEntries } = this.state;\n    if (!newDrink.name.trim()) return;\n    const existing = drinkEntries[selectedDrinkDate] || [];\n    const entry = { id: Date.now(), name: newDrink.name.trim(), store: newDrink.store.trim(), cost: newDrink.cost };\n    const newDrinkEntries = { ...drinkEntries, [selectedDrinkDate]: [...existing, entry] };\n    this.setState({\n      drinkEntries: newDrinkEntries,\n      newDrink: { name:'', store:'', cost:'' },\n      showAddDrink: false,\n    });\n    localStorage.setItem('db_drinks', JSON.stringify(newDrinkEntries));\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec', { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({ type:'飲料紀錄', date:selectedDrinkDate, name:entry.name, store:entry.store, cost:entry.cost }) }).catch(()=>{});\n  }\n\n  removeDrinkEntry(dateKey, id) {\n    const { drinkEntries } = this.state;\n    const updated = (drinkEntries[dateKey] || []).filter(e => e.id !== id);\n    this.setState({ drinkEntries: { ...drinkEntries, [dateKey]: updated } });\n  }\n\n  saveWeeklyReview() {\n    const { weeklyReview } = this.state;\n    if (weeklyReview.nextGoal && weeklyReview.nextGoal.trim()) {\n      this.setState({ weeklyGoal: weeklyReview.nextGoal.trim() });\n    }\n    fetch('https://script.google.com/macros/s/AKfycbwHiq-cvBluh2lcU7h6V4D3Nocon0EfAVUC1hPFk3q-vKxafgM54C9tkjq3Z0YXrc6R/exec', { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({ type:'週計畫回顧', effective:weeklyReview.effective, learnings:weeklyReview.learnings, improve:weeklyReview.improve, change:weeklyReview.change, nextGoal:weeklyReview.nextGoal }) }).catch(()=>{});\n  }\n\n  addLearningItem() {\n    const { newLearningTitle, newLearningEmoji, learningItems } = this.state;\n    if (!newLearningTitle.trim()) return;\n    const item = { id: Date.now(), title: newLearningTitle.trim(), progress: 0, notes: '', emoji: newLearningEmoji.trim() || '📚', completed: false, completedAt: null };\n    const newItems = [item, ...learningItems];\n    this.setState({ learningItems: newItems, showAddLearning: false, newLearningTitle: '', newLearningEmoji: '📚' });\n    localStorage.setItem('db_learning', JSON.stringify(newItems));\n  }\n\n  renderVals() {\n    if (!this._historyFetched) { this._historyFetched = true; setTimeout(() => this.fetchHistory(), 1200); setTimeout(() => this.fetchCalendar(), 600); }\n    const {\n      activeTab, habits, stars, newStarText, newStarType, showAddStar,\n      weeklyReview, weeklyGoal, editingWeeklyGoal, idealDay, editingIdealDay,\n      drinkEntries, selectedDrinkDate, newDrink, showAddDrink,\n      learningItems, showLearningNote,\n      quickTodos, newTodoText,\n      calendarEvents, calendarLoading,\n      showAddLearning, newLearningTitle, newLearningEmoji,\n    } = this.state;\n\n    const now = new Date();\n    const days = ['日','一','二','三','四','五','六'];\n    const greetingDate = `週${days[now.getDay()]}・${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;\n    const h = now.getHours();\n    const greeting = h<6?'深夜了，好好休息 🌙':h<12?'早安 👋':h<18?'午安 ☀️':'晚安 🌟';\n\n    // Calendar\n    const now2 = new Date();\n    const fmt = t => { const d=new Date(t); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };\n    const calEvs = (calendarEvents || []).map((ev,i,arr) => {\n      const s = new Date(ev.start); const e = new Date(ev.end);\n      const isNow = !ev.isAllDay && s <= now2 && now2 < e;\n      const isLast = i === arr.length-1;\n      return {\n        title: ev.title,\n        startTime: ev.isAllDay ? '全天' : fmt(ev.start),\n        timeRange: ev.isAllDay ? '全天活動' : `${fmt(ev.start)} – ${fmt(ev.end)}`,\n        isNow, notNow: !isNow,\n        rowStyle: `display:flex;align-items:center;padding:12px 16px;gap:0;${isLast?'':'border-bottom:1px solid #F5EFE8;'}${isNow?'background:#FCFAF6;':''}`,\n        barStyle: `width:3px;height:34px;border-radius:2px;margin-right:14px;flex-shrink:0;background:${isNow?'#83AECB':'#DDD8D0'};`,\n      };\n    });\n    // Habits\n    const habitDefs = [\n      {id:'A1',group:'清晨五點俱樂部',label:'清晨 5 點起床',hasNoteLink:false},\n      {id:'A2',group:'',label:'爆汗運動 20 分鐘',hasNoteLink:false},\n      {id:'A3',group:'',label:'冥想 + 理想的一天 + 5 個目標',hasNoteLink:false},\n      {id:'A4',group:'',label:'自我成長（學習）20 分鐘',hasNoteLink:false},\n      {id:'B1',group:'日常時間',label:'喝水 1200cc',hasNoteLink:false},\n      {id:'B2',group:'',label:'走路 6,000 步',hasNoteLink:false},\n      {id:'B3',group:'',label:'路人觀察日記',hasNoteLink:false},\n      {id:'B4',group:'',label:'整理桌面',hasNoteLink:false},\n      {id:'B5',group:'',label:'記帳',hasNoteLink:false},\n      {id:'B6',group:'',label:'日記',hasNoteLink:false},\n      {id:'C1',group:'Podcast',label:'靈感紀錄',hasNoteLink:true},\n    ];\n    const habitItems = habitDefs.map(d => ({\n      ...d,\n      showGroup: !!d.group,\n      checked: !!habits[d.id],\n      unchecked: !habits[d.id],\n      toggle: () => this.toggleHabit(d.id),\n      stopProp: (e) => e.stopPropagation(),\n    }));\n    const doneCount = habitItems.filter(x=>x.checked).length;\n    const totalCount = habitItems.length;\n    const pct = totalCount ? Math.round(doneCount/totalCount*100) : 0;\n\n    const weekData = [\n      {day:'一',done:9,total:11},{day:'二',done:8,total:11},\n      {day:'三',done:10,total:11},{day:'四',done:7,total:11},\n      {day:'五',done:9,total:11},{day:'六',done:doneCount,total:totalCount},\n      {day:'日',done:0,total:11},\n    ];\n\n    // Learning\n    const activeLearningItems = learningItems\n      .filter(x => !x.completed)\n      .map(item => ({\n        ...item,\n        progressWidth: item.progress + '%',\n        showNote: showLearningNote === item.id,\n        toggleNote: () => this.setState(s => ({\n          showLearningNote: s.showLearningNote === item.id ? null : item.id,\n        })),\n        complete: () => this.completeLearning(item.id),\n        openNote: item.noteLink ? () => window.open(item.noteLink, '_blank') : null,\n        hasNoteLink: !!item.noteLink,\n      }));\n\n    const completedLearningItems = learningItems\n      .filter(x => x.completed)\n      .sort((a,b) => b.completedAt - a.completedAt)\n      .map(item => {\n        const d = new Date(item.completedAt);\n        return { ...item, completedLabel: `${d.getMonth()+1}月${d.getDate()}日` };\n      });\n    const hasCompletedLearning = completedLearningItems.length > 0;\n\n    // Drinks calendar\n    const calYear = now.getFullYear();\n    const calMonth = now.getMonth();\n    const firstDay = new Date(calYear, calMonth, 1).getDay();\n    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();\n    const todayDate = now.getDate();\n    const drinkMonthLabel = `${calYear}年${calMonth+1}月`;\n    const adjustedFirst = (firstDay + 6) % 7;\n\n    const calendarHeaders = ['一','二','三','四','五','六','日'].map(l => ({ label: l }));\n    const calendarCells = [];\n    for (let i = 0; i < adjustedFirst; i++) {\n      calendarCells.push({ empty:true, hasDay:false });\n    }\n    let drinkDayCount = 0;\n    for (let d = 1; d <= daysInMonth; d++) {\n      const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;\n      const hasDrink = !!(drinkEntries[key] && drinkEntries[key].length > 0);\n      if (hasDrink) drinkDayCount++;\n      const isToday = d === todayDate;\n      const isSelected = key === selectedDrinkDate;\n      const isFuture = d > todayDate;\n      const selectKey = key;\n      calendarCells.push({\n        empty: false,\n        hasDay: true,\n        day: d,\n        hasDrink,\n        nodrink: !hasDrink,\n        select: () => this.setState({ selectedDrinkDate: selectKey, showAddDrink: false, newDrink: { name:'', store:'', cost:'' } }),\n        cellStyle: {\n          aspectRatio: '1',\n          display: 'flex',\n          flexDirection: 'column',\n          alignItems: 'center',\n          justifyContent: 'center',\n          borderRadius: '8px',\n          cursor: 'pointer',\n          background: isSelected ? '#1A1614' : hasDrink ? '#E4EFF7' : isToday ? '#F5EFE8' : 'transparent',\n          border: isSelected ? '1.5px solid #1A1614' : isToday ? '1.5px solid #DDD8D0' : '1.5px solid transparent',\n          transition: 'background .15s ease',\n        },\n        numStyle: {\n          fontSize: '11px',\n          fontWeight: (isToday || isSelected) ? '600' : '400',\n          color: isSelected ? '#FAF7F2' : hasDrink ? '#3A75A0' : isFuture ? '#D4CCC4' : isToday ? '#1A1614' : '#5A5048',\n          lineHeight: '1',\n        },\n      });\n    }\n    while (calendarCells.length % 7 !== 0) {\n      calendarCells.push({ empty:true, hasDay:false });\n    }\n\n    // Selected date info\n    const selD = new Date(selectedDrinkDate + 'T00:00:00');\n    const weekDays = ['週日','週一','週二','週三','週四','週五','週六'];\n    const isSelToday = selectedDrinkDate === `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;\n    const selectedDateLabel = `${selD.getMonth()+1}月${selD.getDate()}日　${weekDays[selD.getDay()]}${isSelToday ? '　今天' : ''}`;\n    const selEntries = drinkEntries[selectedDrinkDate] || [];\n    const selectedDrinkCountLabel = selEntries.length > 0 ? `共 ${selEntries.length} 杯` : '尚無紀錄';\n    const selectedDrinkEntries = selEntries.map(e => ({\n      ...e,\n      remove: () => this.removeDrinkEntry(selectedDrinkDate, e.id),\n    }));\n\n    // Star types\n    const starTypes = ['成就','自信','感恩','勇氣'].map(t => ({\n      label: t,\n      selected: newStarType === t,\n      unselected: newStarType !== t,\n      select: () => this.setState({ newStarType: t }),\n    }));\n\n    const tabColor = tab => activeTab === tab ? '#1A1614' : '#C4BAB0';\n\n    return {\n      showHome: activeTab === 'home',\n      contentAreaStyle: activeTab === 'stars' ? 'flex:0;overflow:hidden' : 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px',\n      contentAreaStyle: activeTab === 'stars' ? 'flex:0;overflow:hidden' : 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px',\n      showCheckin: activeTab === 'checkin',\n      showWeekly: activeTab === 'weekly',\n      showLearn: activeTab === 'learn',\n      showDrinks: activeTab === 'drinks',\n      showStars: activeTab === 'stars',\n      showAddStar,\n\n      greeting, greetingDate,\n      doneCount, totalCount,\n      progressWidth: pct + '%',\n\n      habitItems, weekData,\n\n      activeLearningItems,\n      completedLearningItems,\n      hasCompletedLearning,\n\n      stars, starTypes, newStarText,\n      starCount: stars.length,\n      weeklyReview,\n\n      weeklyGoal,\n      editingWeeklyGoal,\n      notEditingWeeklyGoal: !editingWeeklyGoal,\n      weeklyGoalBtnLabel: editingWeeklyGoal ? '完成' : '編輯',\n\n      idealDay,\n      editingIdealDay,\n      notEditingIdealDay: !editingIdealDay,\n      idealDayBtnLabel: editingIdealDay ? '完成' : '編輯',\n\n      drinkMonthLabel, drinkDayCount,\n      calendarHeaders, calendarCells,\n      selectedDateLabel, selectedDrinkCountLabel,\n      selectedDrinkEntries,\n      showAddDrink,\n      notShowAddDrink: !showAddDrink,\n      newDrinkName: newDrink.name,\n      newDrinkStore: newDrink.store,\n      newDrinkCost: newDrink.cost,\n      setNewDrinkName: (e) => this.setState(s => ({ newDrink: { ...s.newDrink, name: e.target.value } })),\n      setNewDrinkStore: (e) => this.setState(s => ({ newDrink: { ...s.newDrink, store: e.target.value } })),\n      setNewDrinkCost: (e) => this.setState(s => ({ newDrink: { ...s.newDrink, cost: e.target.value } })),\n      openAddDrink: () => this.setState({ showAddDrink: true }),\n      cancelAddDrink: () => this.setState({ showAddDrink: false, newDrink: { name:'', store:'', cost:'' } }),\n      openAddLearning: () => this.setState({ showAddLearning: true }),\n      cancelAddLearning: () => this.setState({ showAddLearning: false, newLearningTitle: '', newLearningEmoji: '📚' }),\n      confirmAddLearning: () => this.addLearningItem(),\n      setNewLearningTitle: (e) => this.setState({ newLearningTitle: e.target.value }),\n      setNewLearningEmoji: (e) => this.setState({ newLearningEmoji: e.target.value }),\n      showAddLearning: this.state.showAddLearning,\n      newLearningTitle: this.state.newLearningTitle,\n      newLearningEmoji: this.state.newLearningEmoji,\n      saveNewDrink: () => this.saveNewDrink(),\n      prevDrinkDay: () => this.shiftDrinkDay(-1),\n      nextDrinkDay: () => this.shiftDrinkDay(1),\n\n      tabHomeColor: tabColor('home'),\n      tabCheckinColor: tabColor('checkin'),\n      tabWeeklyColor: tabColor('weekly'),\n      tabLearnColor: tabColor('learn'),\n      tabDrinksColor: tabColor('drinks'),\n      tabStarsColor: tabColor('stars'),\n\n      quickTodos: quickTodos.map(t => ({\n        ...t,\n        check: () => this.deleteQuickTodo(t.id),\n        delete: () => this.deleteQuickTodo(t.id),\n      })),\n      newTodoText,\n      addQuickTodo: () => this.addQuickTodo(),\n      setNewTodoText: (e) => this.setState({ newTodoText: e.target.value }),\n      handleTodoKeyDown: (e) => { if (e.key === 'Enter') this.addQuickTodo(); },\n\n      calendarEvents: calEvs,\n      calendarLoading,\n      calendarEmpty: !calendarLoading && calEvs.length === 0,\n      calendarBtnLabel: calendarLoading ? '載入中⋯' : '查看行程 →',\n      fetchCalendar: () => this.fetchCalendar(),\n      fetchHistory: () => this.fetchHistory(),\n      goHome: () => { this.setState({ activeTab:'home' }); setTimeout(() => this.fetchHistory(), 300); },\n      goCheckin: () => this.setState({ activeTab:'checkin' }),\n      goWeekly: () => this.setState({ activeTab:'weekly' }),\n      goLearn: () => this.setState({ activeTab:'learn' }),\n      goDrinks: () => this.setState({ activeTab:'drinks' }),\n      goStars: () => this.setState({ activeTab:'stars' }),\n\n      openAddStar: () => this.setState({ showAddStar:true }),\n      closeAddStar: () => this.setState({ showAddStar:false, newStarText:'' }),\n      setNewStarText: (e) => this.setState({ newStarText: e.target.value }),\n      saveStar: () => this.saveStar(),\n\n      setWeeklyGoal: (e) => this.setState({ weeklyGoal: e.target.value }),\n      saveWeeklyGoal: () => this.setState({ editingWeeklyGoal:false }),\n      toggleEditWeeklyGoal: () => this.setState(s => ({ editingWeeklyGoal: !s.editingWeeklyGoal })),\n\n      setIdealDay: (e) => this.setState({ idealDay: e.target.value }),\n      saveIdealDay: () => { this.setState({ editingIdealDay:false }); localStorage.setItem('db_idealDay', this.state.idealDay); },\n      toggleEditIdealDay: () => this.setState(s => ({ editingIdealDay: !s.editingIdealDay })),\n\n      updateEffective: (e) => this.updateReview('effective', e.target.value),\n      updateLearnings: (e) => this.updateReview('learnings', e.target.value),\n      updateImprove: (e) => this.updateReview('improve', e.target.value),\n      updateChange: (e) => this.updateReview('change', e.target.value),\n      updateNextGoal: (e) => this.updateReview('nextGoal', e.target.value),\n      saveWeeklyReview: () => this.saveWeeklyReview(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<style>
/* Fixed bottom nav */
[data-dc-tpl="4"] ~ [data-dc-tpl],
[data-dc-tpl="4"] + * {
  /* fallback - handled by JS below */
}
#dc-nav-patch {
  position: fixed !important;
  bottom: 0 !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  max-width: 430px !important;
  width: 100% !important;
  z-index: 100 !important;
}
</style>
<script>
(function() {
  function patchLayout() {
    // Find main container and nav
    var tpl4 = null, nav = null;
    var allDivs = document.querySelectorAll('div');
    for (var i = 0; i < allDivs.length; i++) {
      var txt = allDivs[i].textContent;
      if (allDivs[i].children.length >= 5 && txt.includes('\u9996\u9801') && txt.includes('\u6253\u5361') && txt.includes('\u661f\u661f')) {
        if (allDivs[i].offsetHeight > 50 && allDivs[i].offsetHeight < 120) {
          nav = allDivs[i];
        }
      }
      if (allDivs[i].getAttribute && allDivs[i].getAttribute('data-dc-tpl') === '4') {
        tpl4 = allDivs[i];
      }
    }
    if (!tpl4 || !nav) return false;

    var navH = nav.offsetHeight || 74;

    // Fix nav: make it fixed
    nav.id = 'dc-nav-patch';

    // Fix main container height
    tpl4.style.height = 'calc(100vh - ' + navH + 'px)';

    // Patch tab switching to add scroll-to-top + dynamic height
    function patchComponent() {
      // Find the DC component by looking for renderVals in prototype chain
      var scHost = document.querySelector('sc-host') || document.querySelector('[data-dc-host]');
      if (!scHost || !scHost.__dc_component) {
        // Try finding component via global DC
        if (window.DC && window.DC._instances && window.DC._instances.length) {
          var comp = window.DC._instances[0];
          applyPatch(comp, tpl4, navH);
          return true;
        }
        return false;
      }
      applyPatch(scHost.__dc_component, tpl4, navH);
      return true;
    }

    function applyPatch(comp, container, navH) {
      if (!comp || !comp.setState) return;
      var origSetState = comp.setState.bind(comp);
      comp.setState = function(updater) {
        var result = origSetState(updater);
        setTimeout(function() {
          // Scroll content to top
          var scrollArea = null;
          for (var i = 0; i < container.children.length; i++) {
            var c = container.children[i];
            if (c.style && (c.style.overflow || c.style.overflowY)) {
              scrollArea = c; break;
            }
          }
          if (scrollArea) scrollArea.scrollTop = 0;
          window.scrollTo(0, 0);

          // Adjust container height based on active tab
          var tab = comp.state && comp.state.activeTab;
          if (tab === 'checkin' || tab === 'weekly') {
            container.style.height = '100vh';
            container.style.paddingBottom = navH + 'px';
          } else {
            container.style.height = 'calc(100vh - ' + navH + 'px)';
            container.style.paddingBottom = '';
          }
        }, 20);
        return result;
      };
    }

    // Try to find component, retry if not ready
    if (!patchComponent()) {
      var tries = 0;
      var iv = setInterval(function() {
        tries++;
        if (patchComponent() || tries > 20) clearInterval(iv);
      }, 200);
    }
    return true;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(patchLayout, 100); });
  } else {
    setTimeout(patchLayout, 100);
  }
})();
</script>
